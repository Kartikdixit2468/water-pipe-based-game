<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipe Flow Puzzle</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --ui-bg: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; 
            background-color: var(--bg-dark);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        header {
            width: 100%; max-width: 1200px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 900; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px;}
        .level-text { color: #94a3b8; font-weight: 700; font-size: 16px; }

        #equation-panel {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 900;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* Game Container */
        #game-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1; 
            background-color: #1e293b;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%; height: 100%;
        }

        /* Overlays */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        .overlay.active { opacity: 1; pointer-events: all; }
        .overlay h2 { font-size: 48px; margin: 0 0 10px 0; font-weight: 900; text-transform: uppercase; }
        .overlay p { font-size: 18px; color: #cbd5e1; margin-bottom: 30px; }
        .overlay.lose h2 { color: var(--danger); }
        .overlay.win h2 { color: var(--success); }

        .btn {
            font-family: 'Nunito', sans-serif;
            background: var(--accent); color: white;
            border: none; padding: 12px 32px;
            border-radius: 12px; font-size: 18px; font-weight: 900;
            cursor: pointer; transition: all 0.1s;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 6px 0 var(--accent-hover);
        }
        .btn:hover { transform: translateY(2px); box-shadow: 0 4px 0 var(--accent-hover); }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--accent-hover); }

        /* Controls */
        #controls {
            width: 100%; max-width: 1200px;
            padding: 15px 30px;
            display: flex; gap: 20px;
        }

        #tray {
            flex-grow: 1;
            background: var(--ui-bg);
            border-radius: 16px; padding: 15px 20px;
            display: flex; gap: 12px; align-items: center;
            border: 2px solid #334155;
            min-height: 80px;
            overflow-x: auto;
        }

        .pipe-block {
            width: 50px; height: 50px;
            background: linear-gradient(180deg, #94a3b8 0%, #64748b 100%);
            border: 2px solid #475569;
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: 900; color: white;
            cursor: grab; flex-shrink: 0;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), 0 4px 6px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: opacity 0.2s;
        }
        .pipe-block:active { cursor: grabbing; transform: scale(0.95); }

        .tray-msg { color: #64748b; font-weight: 700; margin: auto; }

        .side-actions { display: flex; flex-direction: column; gap: 10px; justify-content: center; }
        .btn-small { background: #334155; box-shadow: 0 4px 0 #1e293b; padding: 12px 24px; font-size: 14px;}
        .btn-small:hover { box-shadow: 0 2px 0 #1e293b; background: #475569;}

        #instructions { margin-bottom: 15px; font-size: 14px; color: #94a3b8; text-align: center; }
        .highlight { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Pipe Flow</h1>
            <div class="level-text" id="level-desc">Level 1: Connect to the drain!</div>
        </div>
        <div id="equation-panel">19</div>
    </header>

    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay-lose" class="overlay lose">
            <h2>Spill!</h2>
            <p>The water didn't make it to the target drain.</p>
            <button class="btn" id="btn-retry">Try Again</button>
        </div>

        <div id="overlay-win" class="overlay win">
            <h2>Perfect Flow!</h2>
            <p>You connected the path exactly to the target.</p>
            <button class="btn" id="btn-next">Next Level</button>
        </div>
    </div>

    <div id="controls">
        <div id="tray"></div>
        <div class="side-actions">
            <button class="btn btn-small" id="btn-reset">Reset Board</button>
        </div>
    </div>
    
    <div id="instructions">
        Drag pipes <span class="highlight">freely onto the wall</span>. Drag placed pipes to move them or drop off-screen to return to tray. Click <span class="highlight">⇄</span> to reverse direction.
    </div>

<script>
// --- Canvas Setup ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let LOGIC_W = window.innerWidth;
let LOGIC_H = window.innerHeight;
let offsetX = 0; 

// --- Configuration ---
const CFG = {
    units: 20,
    unitW: 44,
    startY: 60,
    stepH: 80,       // Vertical row spacing
    maxRows: 4,      // 4 rows of pipes max
    waterSpeed: 350,
    pipeRadius: 16
};

const LEVELS = [
    { id: 1, start: 19, target: 2, blocks: [4, 1, 12, 2], desc: "Build a path from right to left." },
    { id: 2, start: 7, target: 13, blocks: [7, 3, 9], desc: "You may need to go backward first." },
    { id: 3, start: 20, target: 2, blocks: [16, 7, 17, 2, 9], desc: "Some pipes are just distractions!" }
];

// --- State ---
let currentLvl = 0;
let level = LEVELS[currentLvl];
let placedPipes = []; // {id, val, dir, col, row}
let available = [];
let gameState = 'build'; // build, flow, spill, win

let isValveOpen = false;
let currentValveRotation = 0;
let targetValveRotation = 0;
let flowDist = 0;
let maxFlowDist = 0;
let pathSegments = []; 

let particles = [];
let bgPattern = null;

// Unified Drag System
let mouseX = 0, mouseY = 0;
let activeDragPipe = null; // Pipe currently being dragged (from tray or canvas)
let snapCol = 0;
let snapRow = 1;
let hoverPipeIdx = -1;

// --- Initialization ---
function generateBgPattern() {
    const pCanvas = document.createElement('canvas');
    pCanvas.width = 64; pCanvas.height = 64;
    const pCtx = pCanvas.getContext('2d');
    pCtx.fillStyle = '#0f172a'; pCtx.fillRect(0, 0, 64, 64);
    pCtx.strokeStyle = '#1e293b'; pCtx.lineWidth = 2;
    pCtx.strokeRect(0, 0, 32, 32); pCtx.strokeRect(32, 32, 32, 32);
    pCtx.strokeRect(32, 0, 32, 32); pCtx.strokeRect(0, 32, 32, 32);
    bgPattern = ctx.createPattern(pCanvas, 'repeat');
}
generateBgPattern();

function resizeCanvas() {
    const wrapper = document.getElementById('game-wrapper');
    const rect = wrapper.getBoundingClientRect();
    LOGIC_W = rect.width;
    LOGIC_H = rect.height;
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    ctx.scale(2, 2);
    offsetX = Math.max(20, (LOGIC_W - (CFG.units * CFG.unitW)) / 2);
}
window.addEventListener('resize', resizeCanvas);

function initLevel() {
    level = LEVELS[currentLvl];
    placedPipes = [];
    available = level.blocks.map((b, i) => ({ val: b, id: `p_${i}`, dir: 1 }));
    gameState = 'build';
    
    isValveOpen = false;
    currentValveRotation = 0; targetValveRotation = 0;
    flowDist = 0; particles = []; activeDragPipe = null;
    
    document.getElementById('overlay-lose').classList.remove('active');
    document.getElementById('overlay-win').classList.remove('active');
    updateUI();
}

function updateUI() {
    document.getElementById('level-desc').innerText = `Level ${currentLvl + 1}: ${level.desc}`;
    document.getElementById('equation-panel').innerText = level.start; // Base start text

    const tray = document.getElementById('tray');
    tray.innerHTML = '';
    
    if (available.length === 0) {
        tray.innerHTML = '<span class="tray-msg">Tray is empty.</span>';
    } else {
        available.forEach(b => {
            const el = document.createElement('div');
            el.className = 'pipe-block';
            el.innerText = b.val;
            el.draggable = true;
            
            // HTML5 Drag out of tray
            el.addEventListener('dragstart', (e) => {
                const img = new Image();
                img.src = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='; // Transparent 1x1 image
                e.dataTransfer.setDragImage(img, 0, 0); 
                
                activeDragPipe = { ...b };
                setTimeout(() => { el.style.opacity = '0.2'; }, 0); // Visually fade the tray block
            });
            
            el.addEventListener('dragend', () => {
                // If dropped nowhere valid, reset drag state
                if (activeDragPipe) {
                    activeDragPipe = null;
                    updateUI();
                }
            });
            tray.appendChild(el);
        });
    }
}

// --- Dynamic Flow Logic ---
function buildFlowGraph() {
    let seq = [];
    let curCol = level.start;
    let curRow = 0; // Starts at Valve
    let totDist = 0;
    let reachedTarget = false;
    let finalX = 0;
    let finalY = 0;

    for (let r = 1; r <= CFG.maxRows; r++) {
        // Find if a pipe is placed exactly where flow drops
        const nextPipe = placedPipes.find(p => p.col === curCol && p.row === r);
        
        let startY = CFG.startY + (curRow) * CFG.stepH;
        let dropY = CFG.startY + (r) * CFG.stepH;
        let px = offsetX + curCol * CFG.unitW;

        if (nextPipe) {
            // Drop down into pipe
            seq.push({ type: 'v', x: px, y1: startY, y2: dropY, len: CFG.stepH });
            totDist += CFG.stepH;
            
            // Flow across horizontal pipe
            let targetX = px + (nextPipe.val * nextPipe.dir * CFG.unitW);
            let hLen = Math.abs(targetX - px);
            seq.push({ type: 'h', y: dropY, x1: px, x2: targetX, dir: nextPipe.dir, len: hLen });
            totDist += hLen;
            
            curCol = curCol + (nextPipe.val * nextPipe.dir);
            curRow = r;
            finalX = targetX;
            finalY = dropY;
        } else {
            // Missing pipe! Water drops straight down and spills
            let spillDropY = startY + CFG.stepH;
            seq.push({ type: 'v', x: px, y1: startY, y2: spillDropY, len: CFG.stepH });
            totDist += CFG.stepH;
            finalX = px;
            finalY = spillDropY;
            break; // Stop tracing graph, flow broke
        }

        // If we successfully flowed through the bottom-most row
        if (r === CFG.maxRows && curCol === level.target) {
            // Drop into final target drain
            let targetDropY = LOGIC_H - 40; // Ground level
            let dropLen = targetDropY - dropY;
            seq.push({ type: 'v', x: finalX, y1: dropY, y2: targetDropY, len: dropLen });
            totDist += dropLen;
            finalY = targetDropY;
            reachedTarget = true;
        }
    }

    return { seq, finalX, finalY, totalDist: totDist, reachedTarget };
}

// --- Pointer Events (Canvas Drag & Interaction) ---
canvas.addEventListener('dragover', (e) => {
    e.preventDefault(); // Allows HTML drop
    updateMouseSnap(e);
});

canvas.addEventListener('drop', (e) => {
    e.preventDefault();
    updateMouseSnap(e); 
    if (activeDragPipe) dropActivePipe();
});

canvas.addEventListener('pointerdown', (e) => {
    if (gameState !== 'build') return;
    
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    // Check Valve Click
    const valveX = offsetX + level.start * CFG.unitW;
    const valveY = CFG.startY - 30;
    if (Math.hypot(mx - valveX, my - valveY) < 30) {
        toggleValve();
        return;
    }

    // Check Placed Pipes
    const pr = CFG.pipeRadius;
    for (let i = placedPipes.length - 1; i >= 0; i--) {
        const p = placedPipes[i];
        let px = offsetX + p.col * CFG.unitW;
        let py = CFG.startY + (p.row - 1) * CFG.stepH;
        let dropY = py + CFG.stepH;
        let targetX = px + (p.val * p.dir * CFG.unitW);
        let midX = (px + targetX) / 2;

        // Hit Reverse Button
        if (Math.hypot(mx - midX, my - (dropY + 22)) < 18) {
            placedPipes[i].dir *= -1;
            return;
        }

        // Hit Pipe Body
        const inVert = mx >= px - pr && mx <= px + pr && my >= py && my <= dropY;
        const inHoriz = mx >= Math.min(px, targetX) - pr && mx <= Math.max(px, targetX) + pr && my >= dropY - pr && my <= dropY + pr;
        
        if (inVert || inHoriz) {
            // Pick up pipe
            activeDragPipe = placedPipes.splice(i, 1)[0];
            updateMouseSnap(e);
            return;
        }
    }
});

canvas.addEventListener('pointermove', (e) => {
    updateMouseSnap(e);
    
    // Update cursor style
    let cursor = 'default';
    hoverPipeIdx = -1;
    
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const valveX = offsetX + level.start * CFG.unitW;
    if (Math.hypot(mx - valveX, my - (CFG.startY - 30)) < 30) cursor = 'pointer';

    placedPipes.forEach((p, i) => {
        let px = offsetX + p.col * CFG.unitW;
        let dropY = CFG.startY + p.row * CFG.stepH;
        let targetX = px + (p.val * p.dir * CFG.unitW);
        if (Math.hypot(mx - (px + targetX)/2, my - (dropY + 22)) < 18) {
            hoverPipeIdx = i; cursor = 'pointer';
        }
    });

    if (activeDragPipe) cursor = 'grabbing';
    canvas.style.cursor = cursor;
});

canvas.addEventListener('pointerup', (e) => {
    if (activeDragPipe) dropActivePipe();
});

function updateMouseSnap(e) {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;

    if (activeDragPipe) {
        // Calculate Grid Snapping
        snapRow = Math.max(1, Math.min(CFG.maxRows, Math.round((mouseY - CFG.startY) / CFG.stepH)));
        snapCol = Math.round((mouseX - offsetX) / CFG.unitW);
        
        // Constrain Column so pipe doesn't exceed screen bounds
        let val = activeDragPipe.val;
        let dir = activeDragPipe.dir;
        if (snapCol + val * dir > 20) snapCol = 20 - (val * dir);
        if (snapCol + val * dir < 0) snapCol = 0 - (val * dir);
        if (snapCol < 0) snapCol = 0; // Absolute bounds
        if (snapCol > 20) snapCol = 20;
    }
}

function dropActivePipe() {
    // If dragged near bottom or off screen, return to tray
    if (mouseY > LOGIC_H - 100) {
        if (!available.find(p => p.id === activeDragPipe.id)) {
            available.push(activeDragPipe);
        }
    } else {
        // Place on grid
        placedPipes.push({
            ...activeDragPipe,
            col: snapCol,
            row: snapRow
        });
        // Remove from available tray if it originated there
        available = available.filter(p => p.id !== activeDragPipe.id);
    }
    
    activeDragPipe = null;
    if (isValveOpen) closeValve();
    updateUI();
}

function toggleValve() {
    isValveOpen = !isValveOpen;
    if (isValveOpen) {
        const layout = buildFlowGraph();
        pathSegments = layout.seq;
        maxFlowDist = layout.totalDist;
        flowDist = 0;
        gameState = 'flow';
        targetValveRotation -= Math.PI; 
    } else {
        closeValve();
    }
}

function closeValve() {
    isValveOpen = false;
    gameState = 'build';
    flowDist = 0;
    particles = [];
    targetValveRotation += Math.PI; 
    document.getElementById('overlay-lose').classList.remove('active');
    document.getElementById('overlay-win').classList.remove('active');
}

// Buttons
document.getElementById('btn-reset').addEventListener('click', initLevel);
document.getElementById('btn-retry').addEventListener('click', closeValve);
document.getElementById('btn-next').addEventListener('click', () => {
    currentLvl = (currentLvl + 1) % LEVELS.length;
    initLevel();
});


// --- Drawing Utilities ---
function roundRect(x, y, w, h, r) {
    ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
}

function drawPipeStructure(col, row, val, dir, isFaded = false) {
    const pr = CFG.pipeRadius;
    let px = offsetX + col * CFG.unitW;
    let py = CFG.startY + (row - 1) * CFG.stepH;
    let dropY = py + CFG.stepH;
    let targetX = px + (val * dir * CFG.unitW);
    let minX = Math.min(px, targetX);
    let w = Math.abs(targetX - px) + (pr*2);

    ctx.globalAlpha = isFaded ? 0.4 : 1.0;

    // Draw Segments
    drawSegment(px - pr, py, pr*2, CFG.stepH);
    drawJoint(px, py);
    
    drawSegment(minX - pr, dropY - pr, w, pr*2);
    drawJoint(px, dropY);
    drawJoint(targetX, dropY);

    // Number Badge
    const midX = (px + targetX) / 2;
    ctx.fillStyle = 'white';
    ctx.font = '900 16px Nunito';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(val, midX, dropY - 25);
    
    // Reverse Button
    ctx.fillStyle = '#475569';
    roundRect(midX - 16, dropY + 12, 32, 20, 10);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText('⇄', midX, dropY + 22);

    ctx.globalAlpha = 1.0;
}

function drawSegment(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; roundRect(x+2, y+2, w, h, 6);
    const grad = ctx.createLinearGradient(x, y, (w>h)?x:x+w, (w>h)?y+h:y);
    grad.addColorStop(0, '#64748b'); grad.addColorStop(0.3, '#cbd5e1'); 
    grad.addColorStop(0.7, '#94a3b8'); grad.addColorStop(1, '#334155'); 
    ctx.fillStyle = grad; roundRect(x, y, w, h, 6);
    ctx.fillStyle = '#0f172a';
    if (w > h) ctx.fillRect(x + 4, y + 8, w - 8, h - 16);
    else ctx.fillRect(x + 8, y + 4, w - 16, h - 8);
}

function drawJoint(x, y) {
    ctx.fillStyle = '#475569'; roundRect(x - 20, y - 20, 40, 40, 8);
    ctx.fillStyle = '#94a3b8'; ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.fill();
}

function renderWaterPath() {
    if (flowDist <= 0) return;
    ctx.lineWidth = 12; ctx.strokeStyle = '#0ea5e9'; 
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    
    let currentDrawDist = flowDist;
    let started = false;

    pathSegments.forEach(seg => {
        if (currentDrawDist <= 0) return;
        let drawLen = Math.min(seg.len, currentDrawDist);
        
        if (!started) {
            ctx.moveTo(seg.type==='v' ? seg.x : seg.x1, seg.type==='v' ? seg.y1 : seg.y);
            started = true;
        }

        if (seg.type === 'v') ctx.lineTo(seg.x, seg.y1 + drawLen);
        else ctx.lineTo(seg.x1 + (drawLen * seg.dir), seg.y);

        currentDrawDist -= seg.len;
    });
    
    ctx.stroke();
    ctx.lineWidth = 4; ctx.strokeStyle = '#7dd3fc'; ctx.stroke();
}

// --- Main Loop & Rendering ---
let lastTime = performance.now();

function updatePhysics(dt) {
    currentValveRotation += (targetValveRotation - currentValveRotation) * 8 * dt;

    if (gameState === 'flow') {
        flowDist += CFG.waterSpeed * dt;
        
        if (flowDist >= maxFlowDist) {
            flowDist = maxFlowDist;
            const layout = buildFlowGraph();
            
            if (layout.reachedTarget) {
                gameState = 'win';
                document.getElementById('overlay-win').classList.add('active');
            } else {
                gameState = 'spill';
            }
        }
    } 
    else if (gameState === 'spill') {
        const layout = buildFlowGraph();
        for(let i=0; i<4; i++) {
            particles.push({
                x: layout.finalX + (Math.random()*10 - 5),
                y: layout.finalY,
                vx: (Math.random()*80 - 40),
                vy: (Math.random()*100 - 50),
                life: 1.0
            });
        }
        if (particles.length > 150) {
            document.getElementById('overlay-lose').classList.add('active');
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.vy += 600 * dt; 
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.life -= dt * 0.5;
        if (p.life <= 0 || p.y > LOGIC_H) particles.splice(i, 1);
    }
}

function render() {
    ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);

    // Background & Drain Base
    ctx.fillStyle = bgPattern; ctx.fillRect(0, 0, LOGIC_W, LOGIC_H);
    const groundY = LOGIC_H - 40;
    ctx.fillStyle = '#1e293b'; ctx.fillRect(0, groundY, LOGIC_W, 40);
    ctx.strokeStyle = '#334155'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(LOGIC_W, groundY); ctx.stroke();

    // Target Area Marker
    const targetPx = offsetX + level.target * CFG.unitW;
    ctx.fillStyle = '#f59e0b'; ctx.fillRect(targetPx - 15, groundY - 15, 30, 15);
    ctx.fillStyle = '#0f172a'; ctx.fillRect(targetPx - 10, groundY - 15, 20, 5); 

    // Render Source Valve Block
    const startPx = offsetX + level.start * CFG.unitW;
    drawSegment(startPx - CFG.pipeRadius, 0, CFG.pipeRadius*2, CFG.startY); 

    // Render Placed Pipes
    placedPipes.forEach((p) => {
        drawPipeStructure(p.col, p.row, p.val, p.dir, false);
    });

    // Render Active Drag Ghost (Exactly replicated fading)
    if (activeDragPipe) {
        drawPipeStructure(snapCol, snapRow, activeDragPipe.val, activeDragPipe.dir, true);
    }

    // Render Water & Spills
    renderWaterPath();
    particles.forEach(p => {
        ctx.fillStyle = `rgba(14, 165, 233, ${p.life})`; 
        ctx.beginPath(); ctx.arc(p.x, p.y, 4 + Math.random()*2, 0, Math.PI*2); ctx.fill();
    });

    // Render Valve Wheel
    ctx.save();
    ctx.translate(startPx, CFG.startY - 30);
    ctx.rotate(currentValveRotation);
    ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(-22, 0); ctx.lineTo(22, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(0, 22); ctx.stroke();
    ctx.fillStyle = '#7f1d1d'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function gameLoop(currentTime) {
    const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
    lastTime = currentTime;

    updatePhysics(dt);
    render();

    requestAnimationFrame(gameLoop);
}

resizeCanvas(); 
initLevel();
requestAnimationFrame(gameLoop);

</script>
</body>
</html>

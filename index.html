<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipe Flow Puzzle</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-dark: #0f172a;
        --ui-bg: #1e293b;
        --text: #f8fafc;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --success: #10b981;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: var(--bg-dark);
        font-family: "Nunito", sans-serif;
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
      }

      header {
        width: 100%;
        max-width: 1200px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        height: 70px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 900;
        color: #38bdf8;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .level-text {
        color: #94a3b8;
        font-weight: 700;
        font-size: 16px;
      }

      #equation-panel {
        background: rgba(255, 255, 255, 0.1);
        padding: 8px 20px;
        border-radius: 12px;
        font-size: 22px;
        font-weight: 900;
        border: 2px solid rgba(255, 255, 255, 0.2);
      }

      /* Game Container */
      #game-wrapper {
        position: relative;
        width: 100%;
        flex-grow: 1;
        background-color: #1e293b;
        box-shadow: inset 0 10px 30px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Overlays */
      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(5px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 10;
      }
      .overlay.active {
        opacity: 1;
        pointer-events: all;
      }
      .overlay h2 {
        font-size: 48px;
        margin: 0 0 10px 0;
        font-weight: 900;
        text-transform: uppercase;
      }
      .overlay p {
        font-size: 18px;
        color: #cbd5e1;
        margin-bottom: 30px;
      }
      .overlay.lose h2 {
        color: var(--danger);
      }
      .overlay.win h2 {
        color: var(--success);
      }

      .btn {
        font-family: "Nunito", sans-serif;
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 900;
        cursor: pointer;
        transition: all 0.1s;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 6px 0 var(--accent-hover);
      }
      .btn:hover {
        transform: translateY(2px);
        box-shadow: 0 4px 0 var(--accent-hover);
      }
      .btn:active {
        transform: translateY(6px);
        box-shadow: 0 0 0 var(--accent-hover);
      }

      /* Controls */
      #controls {
        width: 100%;
        max-width: 1200px;
        padding: 15px 30px;
        display: flex;
        gap: 20px;
        height: 120px;
      }

      #tray {
        flex-grow: 1;
        background: var(--ui-bg);
        border-radius: 16px;
        padding: 15px 20px;
        display: flex;
        gap: 12px;
        align-items: center;
        border: 2px solid #334155;
        overflow-x: auto;
      }

      .pipe-block {
        width: 50px;
        height: 50px;
        background: linear-gradient(180deg, #94a3b8 0%, #64748b 100%);
        border: 2px solid #475569;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        font-weight: 900;
        color: white;
        cursor: grab;
        flex-shrink: 0;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.3),
          0 4px 6px rgba(0, 0, 0, 0.3);
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        transition: opacity 0.2s;
      }
      .pipe-block:active {
        cursor: grabbing;
        transform: scale(0.95);
      }

      .tray-msg {
        color: #64748b;
        font-weight: 700;
        margin: auto;
      }

      .side-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: center;
      }
      .btn-small {
        background: #334155;
        box-shadow: 0 4px 0 #1e293b;
        padding: 12px 24px;
        font-size: 14px;
      }
      .btn-small:hover {
        box-shadow: 0 2px 0 #1e293b;
        background: #475569;
      }

      #instructions {
        margin-bottom: 10px;
        font-size: 14px;
        color: #94a3b8;
        text-align: center;
      }
      .highlight {
        color: #38bdf8;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Pipe Flow</h1>
        <div class="level-text" id="level-desc">
          Level 1: Connect to the drain!
        </div>
      </div>
      <div id="equation-panel">19</div>
    </header>

    <div id="game-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div id="overlay-lose" class="overlay lose">
        <h2>Spill!</h2>
        <p>The water didn't make it to the target drain.</p>
        <button class="btn" id="btn-retry">Try Again</button>
      </div>

      <div id="overlay-win" class="overlay win">
        <h2>Perfect Flow!</h2>
        <p>You connected the path exactly to the target.</p>
        <button class="btn" id="btn-next">Next Level</button>
      </div>
    </div>

    <div id="controls">
      <div id="tray"></div>
      <div class="side-actions">
        <button class="btn btn-small" id="btn-reset">Reset Board</button>
      </div>
    </div>

    <div id="instructions">
      Drag pipes <span class="highlight">freely onto the wall</span>. Drag
      placed pipes to move them or drop off-screen to return to tray. Click
      <span class="highlight">⇄</span> to reverse direction.
    </div>

    <script>
      // --- Canvas Setup ---
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      let LOGIC_W = window.innerWidth;
      let LOGIC_H = window.innerHeight;
      let offsetX = 0;
      let offsetY = 0;

      // --- Configuration ---
      const CFG = {
        units: 20,
        unitW: 52,
        stepH: 72, // 1.4x unitW for taller turns
        maxRows: 6,
        waterSpeed: 350,
        pipeRadius: 16,
      };

      const LEVELS = [
        {
          id: 1,
          start: 19,
          target: 2,
          blocks: [4, 1, 12, 2],
          desc: "Build a path from right to left.",
        },
        {
          id: 2,
          start: 7,
          target: 13,
          blocks: [7, 3, 9],
          desc: "You may need to go backward first.",
        },
        {
          id: 3,
          start: 20,
          target: 2,
          blocks: [16, 7, 17, 2, 9],
          desc: "Some pipes are just distractions!",
        },
      ];

      // --- State ---
      let currentLvl = 0;
      let level = LEVELS[currentLvl];
      let placedPipes = [];
      let available = [];
      let gameState = "build";

      let isValveOpen = false;
      let currentValveRotation = 0;
      let targetValveRotation = 0;
      let flowDist = 0;
      let maxFlowDist = 0;
      let pathSegments = [];

      let particles = [];

      // Unified Drag System
      let mouseX = 0,
        mouseY = 0;
      let activeDragPipe = null;
      let snapCol = 0;
      let snapRow = 1;
      let hoverPipeIdx = -1;

      // --- Initialization ---
      function resizeCanvas() {
        const wrapper = document.getElementById("game-wrapper");
        const rect = wrapper.getBoundingClientRect();
        LOGIC_W = rect.width;
        LOGIC_H = rect.height;
        canvas.width = rect.width * 2;
        canvas.height = rect.height * 2;
        ctx.scale(2, 2);

        // Dynamically compute sizes to keep UI strictly inside screen
        const maxAllowedW = (LOGIC_W - 60) / CFG.units;
        const maxAllowedH = (LOGIC_H - 40) / ((CFG.maxRows + 1) * 1.4 + 0.8);
        CFG.unitW = Math.min(52, maxAllowedW, maxAllowedH);
        CFG.stepH = CFG.unitW * 1.4; // Taller vertical drops

        // Thicker pipe body for robust look
        CFG.pipeRadius = Math.max(12, CFG.unitW * 0.35);

        offsetX = Math.max(30, (LOGIC_W - CFG.units * CFG.unitW) / 2);
        const gameHeight = (CFG.maxRows + 1) * CFG.stepH;
        offsetY = Math.max(20, (LOGIC_H - gameHeight) / 2);
      }
      window.addEventListener("resize", resizeCanvas);

      function getRowY(rowIdx) {
        return offsetY + rowIdx * CFG.stepH;
      }

      function initLevel() {
        level = LEVELS[currentLvl];
        placedPipes = [];
        available = level.blocks.map((b, i) => ({
          val: b,
          id: `p_${i}`,
          dir: 1,
        }));
        gameState = "build";

        isValveOpen = false;
        currentValveRotation = 0;
        targetValveRotation = 0;
        flowDist = 0;
        particles = [];
        activeDragPipe = null;

        document.getElementById("overlay-lose").classList.remove("active");
        document.getElementById("overlay-win").classList.remove("active");
        updateUI();
      }

      function updateUI() {
        document.getElementById("level-desc").innerText =
          `Level ${currentLvl + 1}: ${level.desc}`;
        document.getElementById("equation-panel").innerText = level.start;

        const tray = document.getElementById("tray");
        tray.innerHTML = "";

        if (available.length === 0) {
          tray.innerHTML = '<span class="tray-msg">Tray is empty.</span>';
        } else {
          available.forEach((b) => {
            const el = document.createElement("div");
            el.className = "pipe-block";
            el.innerText = b.val;
            el.draggable = true;

            el.addEventListener("dragstart", (e) => {
              const img = new Image();
              img.src =
                "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
              e.dataTransfer.setDragImage(img, 0, 0);

              activeDragPipe = { ...b };
              setTimeout(() => {
                el.style.opacity = "0.2";
              }, 0);
            });

            el.addEventListener("dragend", () => {
              if (activeDragPipe) {
                activeDragPipe = null;
                updateUI();
              }
            });
            tray.appendChild(el);
          });
        }
      }

      // --- Dynamic Flow Logic ---
      function buildFlowGraph() {
        let seq = [];
        let curCol = level.start;
        let curRow = 0;
        let totDist = 0;
        let reachedTarget = false;
        let finalX = 0;
        let finalY = 0;

        let currentX = offsetX + curCol * CFG.unitW;
        let currentY = getRowY(0);
        seq.push({ type: "start", x: currentX, y: currentY });

        for (let r = 1; r <= CFG.maxRows + 1; r++) {
          // BIDIRECTIONAL ENTRY LOGIC: Water can enter either side of the pipe!
          const nextPipe = placedPipes.find(
            (p) =>
              p.row === r &&
              (p.col === curCol || p.col + p.val * p.dir === curCol),
          );

          let dropY = getRowY(r);
          let px = offsetX + curCol * CFG.unitW;

          if (nextPipe) {
            // Determine which side we entered, and where we exit
            let exitCol =
              nextPipe.col === curCol
                ? nextPipe.col + nextPipe.val * nextPipe.dir
                : nextPipe.col;
            let targetX = offsetX + exitCol * CFG.unitW;

            const pr = CFG.pipeRadius;
            const radius = Math.min(pr * 1.5, Math.abs(targetX - px) / 2);
            const flowDir = Math.sign(targetX - px);

            // Water comes from currentY down to the start of the first arc (dropY - radius)
            let len1 = dropY - radius - currentY;
            if (len1 > 0) totDist += len1;
            let arcLen = (Math.PI / 2) * radius;
            totDist += arcLen;
            seq.push({
              type: "arcTo",
              x1: px,
              y1: dropY,
              x2: px + flowDir * radius,
              y2: dropY,
              radius: radius,
            });

            // Distance added by the second arcTo (line + arc)
            let horizLen = Math.abs(targetX - px) - 2 * radius;
            if (horizLen > 0) totDist += horizLen;
            totDist += arcLen;
            seq.push({
              type: "arcTo",
              x1: targetX,
              y1: dropY,
              x2: targetX,
              y2: dropY + radius,
              radius: radius,
            });

            // Distance added by the final exit stub
            let vertEndY = dropY + CFG.stepH / 2;
            let len2 = vertEndY - (dropY + radius);
            if (len2 > 0) {
              totDist += len2;
              seq.push({ type: "line", x: targetX, y: vertEndY });
            }

            curCol = exitCol; // Move to pipe's exit
            curRow = r;
            currentX = targetX;
            currentY = vertEndY;
            finalX = targetX;
            finalY = vertEndY;
          } else {
            // Flexible Victory check: If we reach the target column and there's no pipe below, it drops to the goal
            if (curCol === level.target) {
              let targetDropY = getRowY(CFG.maxRows + 1) - CFG.stepH / 2;
              let dropLen = targetDropY - currentY;
              seq.push({ type: "line", x: px, y: targetDropY });
              totDist += dropLen;
              finalX = px;
              finalY = targetDropY;
              reachedTarget = true;
            } else {
              // Standard Spill
              let spillDropY = currentY + CFG.stepH;
              seq.push({ type: "line", x: px, y: spillDropY });
              totDist += CFG.stepH;
              finalX = px;
              finalY = spillDropY;
            }
            break;
          }
        }

        return { seq, finalX, finalY, totalDist: totDist, reachedTarget };
      }

      // --- Pointer Events (Canvas Drag & Interaction) ---
      canvas.addEventListener("dragover", (e) => {
        e.preventDefault();
        updateMouseSnap(e);
      });

      canvas.addEventListener("drop", (e) => {
        e.preventDefault();
        updateMouseSnap(e);
        if (activeDragPipe) dropActivePipe();
      });

      canvas.addEventListener("pointerdown", (e) => {
        if (gameState !== "build") return;

        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const valveX = offsetX + level.start * CFG.unitW;
        if (Math.hypot(mx - valveX, my - getRowY(0)) < CFG.unitW * 0.6) {
          toggleValve();
          return;
        }

        const pr = CFG.pipeRadius;
        for (let i = placedPipes.length - 1; i >= 0; i--) {
          const p = placedPipes[i];
          let px = offsetX + p.col * CFG.unitW;
          let dropY = getRowY(p.row);
          let targetX = px + p.val * p.dir * CFG.unitW;
          let midX = (px + targetX) / 2;

          // REVERSE BUTTON LOGIC: Perfectly flips entry and exit without shifting layout
          if (
            Math.hypot(mx - midX, my - (dropY + CFG.unitW * 0.35)) <
            CFG.unitW * 0.4
          ) {
            placedPipes[i].col =
              placedPipes[i].col + placedPipes[i].val * placedPipes[i].dir;
            placedPipes[i].dir *= -1;
            return;
          }

          let vertStartY = dropY - CFG.stepH / 2;
          let vertH = CFG.stepH;

          const inLeftVert =
            mx >= px - pr &&
            mx <= px + pr &&
            my >= vertStartY &&
            my <= vertStartY + vertH;
          const inRightVert =
            mx >= targetX - pr &&
            mx <= targetX + pr &&
            my >= vertStartY &&
            my <= vertStartY + vertH;
          const inHoriz =
            mx >= Math.min(px, targetX) - pr &&
            mx <= Math.max(px, targetX) + pr &&
            my >= dropY - pr &&
            my <= dropY + pr;

          if (inLeftVert || inRightVert || inHoriz) {
            activeDragPipe = placedPipes.splice(i, 1)[0];
            updateMouseSnap(e);
            return;
          }
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        updateMouseSnap(e);

        let cursor = "default";
        hoverPipeIdx = -1;

        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const valveX = offsetX + level.start * CFG.unitW;
        if (Math.hypot(mx - valveX, my - getRowY(0)) < CFG.unitW * 0.6)
          cursor = "pointer";

        placedPipes.forEach((p, i) => {
          let px = offsetX + p.col * CFG.unitW;
          let dropY = getRowY(p.row);
          let targetX = px + p.val * p.dir * CFG.unitW;
          if (
            Math.hypot(
              mx - (px + targetX) / 2,
              my - (dropY + CFG.unitW * 0.35),
            ) <
            CFG.unitW * 0.4
          ) {
            hoverPipeIdx = i;
            cursor = "pointer";
          }
        });

        if (activeDragPipe) cursor = "grabbing";
        canvas.style.cursor = cursor;
      });

      canvas.addEventListener("pointerup", (e) => {
        if (activeDragPipe) dropActivePipe();
      });

      function updateMouseSnap(e) {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;

        if (activeDragPipe) {
          snapRow = Math.max(
            1,
            Math.min(CFG.maxRows, Math.round((mouseY - offsetY) / CFG.stepH)),
          );
          snapCol = Math.round((mouseX - offsetX) / CFG.unitW);
          snapCol = Math.max(0, Math.min(CFG.units, snapCol));

          let val = activeDragPipe.val;

          if (snapCol + val * activeDragPipe.dir > CFG.units) {
            activeDragPipe.dir = -1;
          }
          if (snapCol + val * activeDragPipe.dir < 0) {
            activeDragPipe.dir = 1;
          }

          let dir = activeDragPipe.dir;
          let leftCol = Math.min(snapCol, snapCol + val * dir);
          let rightCol = Math.max(snapCol, snapCol + val * dir);

          if (leftCol < 0) snapCol += 0 - leftCol;
          rightCol = Math.max(snapCol, snapCol + val * dir);
          if (rightCol > CFG.units) snapCol -= rightCol - CFG.units;
        }
      }

      function dropActivePipe() {
        if (mouseY > LOGIC_H - 80) {
          if (!available.find((p) => p.id === activeDragPipe.id)) {
            available.push(activeDragPipe);
          }
        } else {
          placedPipes.push({
            ...activeDragPipe,
            col: snapCol,
            row: snapRow,
          });
          available = available.filter((p) => p.id !== activeDragPipe.id);
        }

        activeDragPipe = null;
        if (isValveOpen) closeValve();
        updateUI();
      }

      function toggleValve() {
        isValveOpen = !isValveOpen;
        if (isValveOpen) {
          const layout = buildFlowGraph();
          pathSegments = layout.seq;
          maxFlowDist = layout.totalDist;
          flowDist = 0;
          gameState = "flow";
          targetValveRotation -= Math.PI;
        } else {
          closeValve();
        }
      }

      function closeValve() {
        isValveOpen = false;
        gameState = "build";
        flowDist = 0;
        particles = [];
        targetValveRotation += Math.PI;
        document.getElementById("overlay-lose").classList.remove("active");
        document.getElementById("overlay-win").classList.remove("active");
      }

      document.getElementById("btn-reset").addEventListener("click", initLevel);
      document
        .getElementById("btn-retry")
        .addEventListener("click", closeValve);
      document.getElementById("btn-next").addEventListener("click", () => {
        currentLvl = (currentLvl + 1) % LEVELS.length;
        initLevel();
      });

      // --- Drawing Utilities ---
      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
        ctx.fill();
      }

      function drawSeamlessPipeStructure(col, row, val, dir, isFaded = false) {
        const pr = CFG.pipeRadius;
        let px = offsetX + col * CFG.unitW; // Entry X
        let dropY = getRowY(row); // Horizontal Level Y
        let targetX = px + val * dir * CFG.unitW; // Exit X

        ctx.globalAlpha = isFaded ? 0.4 : 1.0;

        let vertStartY = dropY - CFG.stepH / 2; // Entry stub going UP
        let vertEndY = dropY + CFG.stepH / 2; // Exit stub going DOWN

        // Corner Radius logic
        const radius = Math.min(pr * 1.5, Math.abs(targetX - px) / 2);
        const flowDir = Math.sign(targetX - px);

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(px, vertStartY);
        ctx.arcTo(px, dropY, px + flowDir * radius, dropY, radius);
        ctx.arcTo(targetX, dropY, targetX, dropY + radius, radius);
        ctx.lineTo(targetX, vertEndY);

        ctx.lineCap = "butt";
        ctx.lineJoin = "round";

        // Deep Border
        ctx.lineWidth = pr * 2.4;
        ctx.strokeStyle = "#1e293b";
        ctx.stroke();

        // Main Pipe Body
        ctx.lineWidth = pr * 1.8;
        ctx.strokeStyle = "#64748b";
        ctx.stroke();

        // Lighting Highlight
        ctx.lineWidth = pr * 0.8;
        ctx.strokeStyle = "#94a3b8";
        ctx.stroke();
        ctx.restore();

        // Entry Flange (Receiving Water)
        ctx.fillStyle = "#475569";
        roundRect(px - pr - 4, vertStartY, pr * 2 + 8, 8, 2);

        // Exit Flange (Dropping Water)
        roundRect(targetX - pr - 4, vertEndY - 8, pr * 2 + 8, 8, 2);

        // Value text
        const fontSize = Math.max(12, CFG.unitW * 0.35);
        const midX = (px + targetX) / 2;
        ctx.fillStyle = "white";
        ctx.font = `900 ${fontSize}px Nunito`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(val, midX, dropY - CFG.unitW * 0.35);

        // Reverse Button
        const btnW = CFG.unitW * 0.6;
        const btnH = CFG.unitW * 0.35;
        const btnY = dropY + CFG.unitW * 0.15;
        ctx.fillStyle = "#475569";
        roundRect(midX - btnW / 2, btnY, btnW, btnH, btnH / 2);
        ctx.fillStyle = "white";
        ctx.font = `bold ${fontSize * 0.8}px sans-serif`;
        ctx.fillText("⇄", midX, btnY + btnH / 2);

        ctx.globalAlpha = 1.0;
      }

      function drawSegment(x, y, w, h, isVertical) {
        if (w <= 0 || h <= 0) return;
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        roundRect(x + 2, y + 2, w, h, 4);
        const grad = ctx.createLinearGradient(
          x,
          y,
          isVertical ? x : x + w,
          isVertical ? y + h : y,
        );
        grad.addColorStop(0, "#64748b");
        grad.addColorStop(0.3, "#cbd5e1");
        grad.addColorStop(0.7, "#94a3b8");
        grad.addColorStop(1, "#334155");
        ctx.fillStyle = grad;
        roundRect(x, y, w, h, 4);
        ctx.fillStyle = "#0f172a";

        const innerGap = Math.max(2, CFG.pipeRadius * 0.4);
        if (!isVertical)
          ctx.fillRect(
            x + innerGap,
            y + innerGap * 1.2,
            w - innerGap * 2,
            h - innerGap * 2.4,
          );
        else
          ctx.fillRect(
            x + innerGap * 1.2,
            y + innerGap,
            w - innerGap * 2.4,
            h - innerGap * 2,
          );
      }

      function renderWaterPath() {
        if (flowDist <= 0) return;
        ctx.beginPath();

        pathSegments.forEach((seg) => {
          if (seg.type === "start") {
            ctx.moveTo(seg.x, seg.y);
          } else if (seg.type === "line") {
            ctx.lineTo(seg.x, seg.y);
          } else if (seg.type === "arcTo") {
            ctx.arcTo(seg.x1, seg.y1, seg.x2, seg.y2, seg.radius);
          }
        });

        // Use dashed line trick to perfectly fill the pipe's internal arcs up to flowDist
        ctx.setLineDash([flowDist, 999999]);
        ctx.lineDashOffset = 0;

        ctx.lineWidth = CFG.pipeRadius * 1.2;
        ctx.strokeStyle = "#0ea5e9";
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();

        ctx.lineWidth = CFG.pipeRadius * 0.6;
        ctx.strokeStyle = "#7dd3fc";
        ctx.stroke();

        ctx.setLineDash([]); // Restore stroke styling for rest of the game
      }

      // --- Main Loop & Rendering ---
      let lastTime = performance.now();

      function updatePhysics(dt) {
        currentValveRotation +=
          (targetValveRotation - currentValveRotation) * 8 * dt;

        if (gameState === "flow") {
          flowDist += CFG.waterSpeed * dt;

          if (flowDist >= maxFlowDist) {
            flowDist = maxFlowDist;
            const layout = buildFlowGraph();

            if (layout.reachedTarget) {
              gameState = "win";
              document.getElementById("overlay-win").classList.add("active");
            } else {
              gameState = "spill";
            }
          }
        } else if (gameState === "spill") {
          const layout = buildFlowGraph();
          for (let i = 0; i < 4; i++) {
            particles.push({
              x: layout.finalX + (Math.random() * 10 - 5),
              y: layout.finalY,
              vx: Math.random() * 80 - 40,
              vy: Math.random() * 100 - 50,
              life: 1.0,
            });
          }
          if (particles.length > 150) {
            document.getElementById("overlay-lose").classList.add("active");
          }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i];
          p.vy += 600 * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= dt * 0.5;
          if (p.life <= 0 || p.y > LOGIC_H) particles.splice(i, 1);
        }
      }

      function render() {
        ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);

        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, LOGIC_W, LOGIC_H);

        const pipeWidth = CFG.units * CFG.unitW + CFG.unitW * 2;
        const pipeStartX = offsetX - CFG.unitW;
        const rulerHeight = CFG.unitW * 0.8;

        const rulerFontSize = Math.max(12, CFG.unitW * 0.35);

        // --- TOP RULER PIPE ---
        const topPipeY = getRowY(0);
        drawSegment(
          pipeStartX,
          topPipeY - rulerHeight / 2,
          pipeWidth,
          rulerHeight,
          false,
        );

        const startPx = offsetX + level.start * CFG.unitW;
        drawSegment(
          startPx - CFG.pipeRadius,
          topPipeY,
          CFG.pipeRadius * 2,
          CFG.stepH / 2,
          true,
        );

        ctx.fillStyle = "#475569";
        roundRect(
          startPx - CFG.pipeRadius - 2,
          topPipeY + CFG.stepH / 2 - 8,
          CFG.pipeRadius * 2 + 4,
          8,
          2,
        );

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (let i = 0; i <= CFG.units; i++) {
          let px = offsetX + i * CFG.unitW;
          ctx.fillStyle = "#94a3b8";
          ctx.fillRect(px - 1, topPipeY + rulerHeight / 2 - 8, 2, 8);
          ctx.fillStyle = "white";
          ctx.font = `900 ${rulerFontSize}px Nunito`;
          ctx.fillText(i, px, topPipeY - 2);
        }

        // --- BOTTOM RULER PIPE ---
        const bottomPipeY = getRowY(CFG.maxRows + 1);
        drawSegment(
          pipeStartX,
          bottomPipeY - rulerHeight / 2,
          pipeWidth,
          rulerHeight,
          false,
        );

        const targetPx = offsetX + level.target * CFG.unitW;
        const targetTopY = bottomPipeY - CFG.stepH / 2;
        drawSegment(
          targetPx - CFG.pipeRadius,
          targetTopY,
          CFG.pipeRadius * 2,
          CFG.stepH / 2,
          true,
        );

        ctx.fillStyle = "#f59e0b";
        ctx.beginPath();
        ctx.roundRect(
          targetPx - CFG.unitW * 0.35,
          targetTopY,
          CFG.unitW * 0.7,
          8,
          4,
        );
        ctx.fill();
        ctx.fillStyle = "#0f172a";
        ctx.beginPath();
        ctx.roundRect(
          targetPx - CFG.unitW * 0.25,
          targetTopY + 2,
          CFG.unitW * 0.5,
          4,
          2,
        );
        ctx.fill();

        for (let i = 0; i <= CFG.units; i++) {
          let px = offsetX + i * CFG.unitW;
          ctx.fillStyle = "#94a3b8";
          ctx.fillRect(px - 1, bottomPipeY - rulerHeight / 2, 2, 8);
          ctx.fillStyle = i === level.target ? "#fcd34d" : "white";
          ctx.font = `900 ${rulerFontSize}px Nunito`;
          ctx.fillText(i, px, bottomPipeY + 4);
        }

        // Render Placed Pipes (NEW S-Curve Logic)
        placedPipes.forEach((p) => {
          drawSeamlessPipeStructure(p.col, p.row, p.val, p.dir, false);
        });

        // Render Active Drag Ghost
        if (activeDragPipe) {
          drawSeamlessPipeStructure(
            snapCol,
            snapRow,
            activeDragPipe.val,
            activeDragPipe.dir,
            true,
          );
        }

        // Render Water & Spills
        renderWaterPath();
        particles.forEach((p) => {
          ctx.fillStyle = `rgba(14, 165, 233, ${p.life})`;
          ctx.beginPath();
          ctx.arc(
            p.x,
            p.y,
            Math.max(2, CFG.unitW * 0.1) + Math.random() * 2,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        });

        // Render Valve Wheel exactly on Top Pipe
        const wheelSize = CFG.unitW * 0.4;
        ctx.save();
        ctx.translate(startPx, topPipeY);
        ctx.rotate(currentValveRotation);
        ctx.fillStyle = "#ef4444";
        ctx.beginPath();
        ctx.arc(0, 0, wheelSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#0f172a";
        ctx.beginPath();
        ctx.arc(0, 0, wheelSize * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#ef4444";
        ctx.lineWidth = wheelSize * 0.2;
        ctx.beginPath();
        ctx.moveTo(-wheelSize, 0);
        ctx.lineTo(wheelSize, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, -wheelSize);
        ctx.lineTo(0, wheelSize);
        ctx.stroke();
        ctx.fillStyle = "#7f1d1d";
        ctx.beginPath();
        ctx.arc(0, 0, wheelSize * 0.25, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function gameLoop(currentTime) {
        const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
        lastTime = currentTime;

        updatePhysics(dt);
        render();

        requestAnimationFrame(gameLoop);
      }

      resizeCanvas();
      initLevel();
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipe Flow Puzzle</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-dark: #0f172a;
        --ui-bg: #1e293b;
        --text: #f8fafc;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --success: #10b981;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: var(--bg-dark);
        font-family: "Nunito", sans-serif;
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
      }

      #app-container {
        width: 1200px;
        height: 800px;
        display: flex;
        flex-direction: column;
        transform-origin: center center;
        position: relative;
      }

      header {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 30px;
        height: 80px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        font-weight: 900;
        color: #38bdf8;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .level-text {
        color: #94a3b8;
        font-weight: 700;
        font-size: 18px;
        transition: opacity 0.3s;
      }

      #equation-panel {
        background: rgba(255, 255, 255, 0.1);
        padding: 10px 24px;
        border-radius: 12px;
        font-size: 26px;
        font-weight: 900;
        border: 2px solid rgba(255, 255, 255, 0.2);
        transition: opacity 0.3s;
      }

      #game-wrapper {
        position: relative;
        width: 100%;
        height: 560px;
        background-color: #162032;
        box-shadow:
          inset 0 0 40px rgba(0, 0, 0, 0.6),
          0 8px 24px rgba(0, 0, 0, 0.3);
        border: 2px solid #334155;
        border-radius: 16px;
        overflow: hidden;
        margin: 5px 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(5px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 10;
      }
      .overlay.active {
        opacity: 1;
        pointer-events: all;
      }
      .overlay h2 {
        font-size: 56px;
        margin: 0 0 10px 0;
        font-weight: 900;
        text-transform: uppercase;
      }
      .overlay p {
        font-size: 22px;
        color: #cbd5e1;
        margin-bottom: 30px;
      }
      .overlay.lose h2 {
        color: var(--danger);
      }
      .overlay.win h2 {
        color: var(--success);
      }

      .btn {
        font-family: "Nunito", sans-serif;
        background: var(--accent);
        color: white;
        border: none;
        padding: 14px 40px;
        border-radius: 12px;
        font-size: 20px;
        font-weight: 900;
        cursor: pointer;
        transition: all 0.1s;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 6px 0 var(--accent-hover);
      }
      .btn:hover {
        transform: translateY(2px);
        box-shadow: 0 4px 0 var(--accent-hover);
      }
      .btn:active {
        transform: translateY(6px);
        box-shadow: 0 0 0 var(--accent-hover);
      }

      #controls {
        width: 100%;
        padding: 15px 0;
        display: flex;
        gap: 20px;
        height: 120px;
      }

      #tray {
        flex-grow: 1;
        background: var(--ui-bg);
        border-radius: 16px;
        padding: 15px 24px;
        display: flex;
        gap: 16px;
        align-items: center;
        border: 2px solid #334155;
        overflow-x: auto;
      }

      .pipe-block {
        width: 60px;
        height: 60px;
        background: linear-gradient(180deg, #94a3b8 0%, #64748b 100%);
        border: 2px solid #475569;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: 900;
        color: white;
        cursor: grab;
        flex-shrink: 0;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.3),
          0 4px 6px rgba(0, 0, 0, 0.3);
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        transition: opacity 0.2s;
      }
      .pipe-block:active {
        cursor: grabbing;
        transform: scale(0.95);
      }

      .tray-msg {
        color: #64748b;
        font-weight: 700;
        font-size: 20px;
        margin: auto;
      }

      .side-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: center;
      }
      .btn-small {
        background: #334155;
        box-shadow: 0 4px 0 #1e293b;
        padding: 16px 32px;
        font-size: 16px;
      }
      .btn-small:hover {
        box-shadow: 0 2px 0 #1e293b;
        background: #475569;
      }

      #instructions {
        margin-top: 10px;
        font-size: 16px;
        color: #94a3b8;
        text-align: center;
      }
      .highlight {
        color: #38bdf8;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="app-container">
      <header>
        <div>
          <h1>Pipe Flow</h1>
          <div class="level-text" id="level-desc">
            Level 1: Connect to the drain!
          </div>
        </div>
        <div id="equation-panel">19</div>
      </header>

      <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>

        <div id="overlay-lose" class="overlay lose">
          <h2>Spill!</h2>
          <p>The water didn't make it to the target drain.</p>
          <button class="btn" id="btn-retry">Try Again</button>
        </div>

        <div id="overlay-win" class="overlay win">
          <h2>Perfect Flow!</h2>
          <p>You connected the path exactly to the target.</p>
          <button class="btn" id="btn-next">Next Level</button>
        </div>
      </div>

      <div id="controls">
        <div id="tray"></div>
        <div class="side-actions">
          <button class="btn btn-small" id="btn-reset">Reset Board</button>
        </div>
      </div>

      <div id="instructions">
        Drag pipes <span class="highlight">freely onto the wall</span>. Drag
        placed pipes to move them. Click <span class="highlight">⇄</span> to
        reverse direction.
      </div>
    </div>

    <script>
      // --- Universal App Scaling ---
      function resizeApp() {
        const app = document.getElementById("app-container");
        const scale = Math.min(
          window.innerWidth / 1200,
          window.innerHeight / 800,
        );
        app.style.transform = `scale(${scale})`;
      }
      window.addEventListener("resize", resizeApp);
      resizeApp();

      // --- Fixed Canvas Logic Dimensions ---
      const LOGIC_W = 1200;
      const LOGIC_H = 560;
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      canvas.width = LOGIC_W * 2;
      canvas.height = LOGIC_H * 2;
      ctx.scale(2, 2);

      // --- Game Configuration ---
      const CFG = {
        units: 20,
        unitW: 52,
        waterSpeed: 350,
        pipeRadius: 16,
        topRulerY: 70,
        bottomRulerY: 490,
      };
      const offsetX = (LOGIC_W - CFG.units * CFG.unitW) / 2; // 80px

      // Dynamically generate an endless supply of levels!
      function generateLevels(count) {
        const generated = [];
        for (let id = 1; id <= count; id++) {
          let start, target, blocks, pathLen;
          let isValid = false;

          while (!isValid) {
            start = Math.floor(Math.random() * 21);
            // Increase path length to at least 4 pipes (4 to 6 pipes)
            pathLen = Math.floor(Math.random() * 3) + 4;
            let current = start;
            blocks = [];
            let failed = false;

            // Generate a random path sequence
            for (let i = 0; i < pathLen; i++) {
              let validMoves = [];
              // Restrict pipe lengths to a smaller range (2 to 9) to prevent huge impossible jumps
              for (let len = 2; len <= 9; len++) {
                if (current + len <= 20) validMoves.push({ len, dir: 1 });
                if (current - len >= 0) validMoves.push({ len, dir: -1 });
              }

              if (validMoves.length === 0) {
                failed = true;
                break;
              }

              // Pick a random valid pipe for this step
              let move =
                validMoves[Math.floor(Math.random() * validMoves.length)];
              blocks.push(move.len);
              current += move.len * move.dir;
            }

            target = current;
            // Ensure target is different from start and generation didn't fail
            if (!failed && target !== start) {
              isValid = true;
            }
          }

          let desc =
            id === 1
              ? "Build a path from start to target."
              : "Arrange the pipes to reach the target.";

          // 40% chance to add a distraction block (also kept smaller)
          if (Math.random() < 0.4) {
            blocks.push(Math.floor(Math.random() * 8) + 2); // 2 to 9
            desc = "Some pipes are just distractions!";
          }

          // Shuffle the tray blocks so the order isn't obvious
          blocks.sort(() => Math.random() - 0.5);

          generated.push({
            id: id,
            start: start,
            target: target,
            blocks: blocks,
            desc: desc,
            maxRows: pathLen,
          });
        }
        return generated;
      }

      // Pre-generate 100 dynamic levels!
      const LEVELS = generateLevels(100);

      // --- State ---
      let currentLvl = 0;
      let level = LEVELS[currentLvl];
      let placedPipes = [];
      let available = [];
      let gameState = "build";
      let stepH = 0;

      let isValveOpen = false;
      let currentValveRotation = 0;
      let targetValveRotation = 0;
      let flowDist = 0;
      let maxFlowDist = 0;
      let pathSegments = [];
      let particles = [];

      // Transition State
      let isTransitioning = false;
      let cameraY = 0;

      // Drag System
      let mouseX = 0,
        mouseY = 0;
      let activeDragPipe = null;
      let snapCol = 0,
        snapRow = 1;

      function getRowY(rowIdx) {
        if (rowIdx === 0) return CFG.topRulerY;
        if (rowIdx === level.maxRows + 1) return CFG.bottomRulerY;
        return CFG.topRulerY + rowIdx * stepH;
      }

      function initLevel() {
        level = LEVELS[currentLvl];
        placedPipes = [];
        available = level.blocks.map((b, i) => ({
          val: b,
          id: `p_${currentLvl}_${i}`,
          dir: 1,
        }));
        gameState = "build";

        const totalDistance = CFG.bottomRulerY - CFG.topRulerY;
        stepH = totalDistance / (level.maxRows + 1);

        isValveOpen = false;
        currentValveRotation = 0;
        targetValveRotation = 0;
        flowDist = 0;
        particles = [];
        activeDragPipe = null;

        document.getElementById("overlay-lose").classList.remove("active");
        document.getElementById("overlay-win").classList.remove("active");
        updateUI();
      }

      function updateUI() {
        document.getElementById("level-desc").innerText =
          `Level ${currentLvl + 1}: ${level.desc}`;
        document.getElementById("equation-panel").innerText = level.start;

        const tray = document.getElementById("tray");
        tray.innerHTML = "";

        if (available.length === 0) {
          tray.innerHTML = '<span class="tray-msg">Tray is empty.</span>';
        } else {
          available.forEach((b) => {
            const el = document.createElement("div");
            el.className = "pipe-block";
            el.innerText = b.val;
            el.draggable = true;

            el.addEventListener("dragstart", (e) => {
              const img = new Image();
              img.src =
                "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
              e.dataTransfer.setDragImage(img, 0, 0);
              activeDragPipe = { ...b };
              setTimeout(() => {
                el.style.opacity = "0.2";
              }, 0);
            });

            el.addEventListener("dragend", () => {
              if (activeDragPipe) {
                activeDragPipe = null;
                updateUI();
              }
            });
            tray.appendChild(el);
          });
        }
      }

      // --- Dynamic Flow Logic ---
      function buildFlowGraph() {
        let seq = [];
        let curCol = level.start;
        let curRow = 0;
        let totDist = 0;
        let reachedTarget = false;
        let finalX = 0,
          finalY = 0;

        let currentX = offsetX + curCol * CFG.unitW;
        let currentY = getRowY(0);
        seq.push({ type: "start", x: currentX, y: currentY });

        for (let r = 1; r <= level.maxRows + 1; r++) {
          const nextPipe = placedPipes.find(
            (p) =>
              p.row === r &&
              (p.col === curCol || p.col + p.val * p.dir === curCol),
          );

          let dropY = getRowY(r);
          let px = offsetX + curCol * CFG.unitW;

          if (nextPipe) {
            let exitCol =
              nextPipe.col === curCol
                ? nextPipe.col + nextPipe.val * nextPipe.dir
                : nextPipe.col;
            let targetX = offsetX + exitCol * CFG.unitW;

            const pr = CFG.pipeRadius;
            const radius = Math.min(pr * 1.5, Math.abs(targetX - px) / 2);
            const flowDir = Math.sign(targetX - px);

            let len1 = dropY - radius - currentY;
            if (len1 > 0) totDist += len1;
            let arcLen = (Math.PI / 2) * radius;
            totDist += arcLen;
            seq.push({
              type: "arcTo",
              x1: px,
              y1: dropY,
              x2: px + flowDir * radius,
              y2: dropY,
              radius: radius,
            });

            let horizLen = Math.abs(targetX - px) - 2 * radius;
            if (horizLen > 0) totDist += horizLen;
            totDist += arcLen;
            seq.push({
              type: "arcTo",
              x1: targetX,
              y1: dropY,
              x2: targetX,
              y2: dropY + radius,
              radius: radius,
            });

            let vertEndY = dropY + stepH / 2;
            let len2 = vertEndY - (dropY + radius);
            if (len2 > 0) {
              totDist += len2;
              seq.push({ type: "line", x: targetX, y: vertEndY });
            }

            curCol = exitCol;
            curRow = r;
            currentX = targetX;
            currentY = vertEndY;
            finalX = targetX;
            finalY = vertEndY;
          } else {
            if (curCol === level.target) {
              let targetDropY = getRowY(level.maxRows + 1);
              let dropLen = targetDropY - currentY;
              seq.push({ type: "line", x: px, y: targetDropY });
              totDist += dropLen;
              finalX = px;
              finalY = targetDropY;
              reachedTarget = true;
            } else {
              let spillDropY = currentY + stepH;
              seq.push({ type: "line", x: px, y: spillDropY });
              totDist += stepH;
              finalX = px;
              finalY = spillDropY;
            }
            break;
          }
        }

        return { seq, finalX, finalY, totalDist: totDist, reachedTarget };
      }

      function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = LOGIC_W / rect.width;
        const scaleY = LOGIC_H / rect.height;
        return {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top) * scaleY,
        };
      }

      canvas.addEventListener("dragover", (e) => {
        e.preventDefault();
        updateMouseSnap(e);
      });
      canvas.addEventListener("drop", (e) => {
        e.preventDefault();
        updateMouseSnap(e);
        if (activeDragPipe) dropActivePipe();
      });

      canvas.addEventListener("pointerdown", (e) => {
        if (gameState !== "build" || isTransitioning) return;
        const pos = getMousePos(e);

        const valveX = offsetX + level.start * CFG.unitW;
        if (Math.hypot(pos.x - valveX, pos.y - getRowY(0)) < CFG.unitW * 0.8) {
          toggleValve();
          return;
        }

        const pr = CFG.pipeRadius;
        for (let i = placedPipes.length - 1; i >= 0; i--) {
          const p = placedPipes[i];
          let px = offsetX + p.col * CFG.unitW;
          let dropY = getRowY(p.row);
          let targetX = px + p.val * p.dir * CFG.unitW;
          let midX = (px + targetX) / 2;

          if (
            Math.hypot(pos.x - midX, pos.y - (dropY - 32)) <
            CFG.unitW * 0.4
          ) {
            placedPipes[i].col =
              placedPipes[i].col + placedPipes[i].val * placedPipes[i].dir;
            placedPipes[i].dir *= -1;
            return;
          }

          let vertStartY = dropY - stepH / 2;
          const inLeftVert =
            pos.x >= px - pr &&
            pos.x <= px + pr &&
            pos.y >= vertStartY &&
            pos.y <= vertStartY + stepH;
          const inRightVert =
            pos.x >= targetX - pr &&
            pos.x <= targetX + pr &&
            pos.y >= vertStartY &&
            pos.y <= vertStartY + stepH;
          const inHoriz =
            pos.x >= Math.min(px, targetX) - pr &&
            pos.x <= Math.max(px, targetX) + pr &&
            pos.y >= dropY - pr &&
            pos.y <= dropY + pr;

          if (inLeftVert || inRightVert || inHoriz) {
            activeDragPipe = placedPipes.splice(i, 1)[0];
            updateMouseSnap(e);
            return;
          }
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        if (isTransitioning) return;
        updateMouseSnap(e);
        const pos = getMousePos(e);
        let cursor = "default";

        const valveX = offsetX + level.start * CFG.unitW;
        if (Math.hypot(pos.x - valveX, pos.y - getRowY(0)) < CFG.unitW * 0.8)
          cursor = "pointer";

        placedPipes.forEach((p) => {
          let px = offsetX + p.col * CFG.unitW;
          let dropY = getRowY(p.row);
          let targetX = px + p.val * p.dir * CFG.unitW;
          if (
            Math.hypot(pos.x - (px + targetX) / 2, pos.y - (dropY - 32)) <
            CFG.unitW * 0.4
          )
            cursor = "pointer";
        });

        if (activeDragPipe) cursor = "grabbing";
        canvas.style.cursor = cursor;
      });

      canvas.addEventListener("pointerup", () => {
        if (activeDragPipe) dropActivePipe();
      });

      function updateMouseSnap(e) {
        if (!activeDragPipe) return;
        const pos = getMousePos(e);

        snapRow = Math.max(
          1,
          Math.min(level.maxRows, Math.round((pos.y - CFG.topRulerY) / stepH)),
        );
        snapCol = Math.round((pos.x - offsetX) / CFG.unitW);
        snapCol = Math.max(0, Math.min(CFG.units, snapCol));

        let val = activeDragPipe.val;

        if (snapCol + val * activeDragPipe.dir > CFG.units)
          activeDragPipe.dir = -1;
        if (snapCol + val * activeDragPipe.dir < 0) activeDragPipe.dir = 1;

        let dir = activeDragPipe.dir;
        let leftCol = Math.min(snapCol, snapCol + val * dir);
        if (leftCol < 0) snapCol += 0 - leftCol;
        if (Math.max(snapCol, snapCol + val * dir) > CFG.units)
          snapCol -= Math.max(snapCol, snapCol + val * dir) - CFG.units;

        mouseX = pos.x;
        mouseY = pos.y;
      }

      function dropActivePipe() {
        if (mouseY > LOGIC_H - 80) {
          if (!available.find((p) => p.id === activeDragPipe.id))
            available.push(activeDragPipe);
        } else {
          placedPipes.push({ ...activeDragPipe, col: snapCol, row: snapRow });
          available = available.filter((p) => p.id !== activeDragPipe.id);
        }
        activeDragPipe = null;
        if (isValveOpen) closeValve();
        updateUI();
      }

      function toggleValve() {
        isValveOpen = !isValveOpen;
        if (isValveOpen) {
          const layout = buildFlowGraph();
          pathSegments = layout.seq;
          maxFlowDist = layout.totalDist;
          flowDist = 0;
          gameState = "flow";
          targetValveRotation -= Math.PI;
        } else closeValve();
      }

      function closeValve() {
        isValveOpen = false;
        gameState = "build";
        flowDist = 0;
        particles = [];
        targetValveRotation += Math.PI;
        document.getElementById("overlay-lose").classList.remove("active");
        document.getElementById("overlay-win").classList.remove("active");
      }

      // --- Transition Logic Trigger ---
      document.getElementById("btn-next").addEventListener("click", () => {
        document.getElementById("overlay-win").classList.remove("active");

        // Set Transition state
        gameState = "transition";
        isTransitioning = true;

        // Update header text immediately for smoothness
        const nextIdx = (currentLvl + 1) % LEVELS.length;
        document.getElementById("level-desc").innerText =
          `Level ${nextIdx + 1}: ${LEVELS[nextIdx].desc}`;
        document.getElementById("equation-panel").innerText =
          LEVELS[nextIdx].start;
        document.getElementById("tray").innerHTML = "";
      });

      document.getElementById("btn-reset").addEventListener("click", initLevel);
      document
        .getElementById("btn-retry")
        .addEventListener("click", closeValve);

      // --- Drawing Utilities ---
      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
        ctx.fill();
      }

      function drawSegment(x, y, w, h, isVertical) {
        if (w <= 0 || h <= 0) return;
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        roundRect(x + 2, y + 2, w, h, 4);
        const grad = ctx.createLinearGradient(
          x,
          y,
          isVertical ? x : x + w,
          isVertical ? y + h : y,
        );
        grad.addColorStop(0, "#64748b");
        grad.addColorStop(0.3, "#cbd5e1");
        grad.addColorStop(0.7, "#94a3b8");
        grad.addColorStop(1, "#334155");
        ctx.fillStyle = grad;
        roundRect(x, y, w, h, 4);
        ctx.fillStyle = "#0f172a";

        const innerGap = Math.max(2, CFG.pipeRadius * 0.4);
        if (!isVertical)
          ctx.fillRect(
            x + innerGap,
            y + innerGap * 1.2,
            w - innerGap * 2,
            h - innerGap * 2.4,
          );
        else
          ctx.fillRect(
            x + innerGap * 1.2,
            y + innerGap,
            w - innerGap * 2.4,
            h - innerGap * 2,
          );
      }

      function drawSeamlessPipeStructure(
        col,
        row,
        val,
        dir,
        isFaded,
        localStepH,
        getLocalRowY,
      ) {
        const pr = CFG.pipeRadius;
        let px = offsetX + col * CFG.unitW;
        let dropY = getLocalRowY(row);
        let targetX = px + val * dir * CFG.unitW;

        ctx.globalAlpha = isFaded ? 0.4 : 1.0;

        let vertStartY = dropY - localStepH / 2;
        let vertEndY = dropY + localStepH / 2;

        const radius = Math.min(pr * 1.5, Math.abs(targetX - px) / 2);
        const flowDir = Math.sign(targetX - px);

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(px, vertStartY);
        ctx.arcTo(px, dropY, px + flowDir * radius, dropY, radius);
        ctx.arcTo(targetX, dropY, targetX, dropY + radius, radius);
        ctx.lineTo(targetX, vertEndY);

        ctx.lineCap = "butt";
        ctx.lineJoin = "round";

        ctx.lineWidth = pr * 2.4;
        ctx.strokeStyle = "#1e293b";
        ctx.stroke();

        ctx.lineWidth = pr * 1.8;
        ctx.strokeStyle = "#64748b";
        ctx.stroke();

        ctx.lineWidth = pr * 0.8;
        ctx.strokeStyle = "#94a3b8";
        ctx.stroke();
        ctx.restore();

        // Entry Flange
        ctx.fillStyle = "#475569";
        roundRect(px - pr - 4, vertStartY, pr * 2 + 8, 8, 2);
        // Exit Flange
        roundRect(targetX - pr - 4, vertEndY - 8, pr * 2 + 8, 8, 2);

        // Value text (Moved to bottom)
        const midX = (px + targetX) / 2;
        ctx.fillStyle = "white";
        ctx.font = `900 20px Nunito`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(val, midX, dropY + 38);

        // Reverse Button (Moved to top)
        const btnW = 32;
        const btnH = 20;
        const btnY = dropY - 32;
        ctx.fillStyle = "#475569";
        roundRect(midX - btnW / 2, btnY, btnW, btnH, btnH / 2);
        ctx.fillStyle = "white";
        ctx.font = `bold 12px sans-serif`;
        ctx.fillText("⇄", midX, btnY + btnH / 2);

        ctx.globalAlpha = 1.0;
      }

      function drawLevelContent(lvl, pipesArr, fDist, pSegments, parts, vRot) {
        const localStepH =
          (CFG.bottomRulerY - CFG.topRulerY) / (lvl.maxRows + 1);
        const getLocalRowY = (rowIdx) => {
          if (rowIdx === 0) return CFG.topRulerY;
          if (rowIdx === lvl.maxRows + 1) return CFG.bottomRulerY;
          return CFG.topRulerY + rowIdx * localStepH;
        };

        const pipeWidth = CFG.units * CFG.unitW + CFG.unitW * 2;
        const pipeStartX = offsetX - CFG.unitW;
        const rulerHeight = 44;

        // TOP RULER PIPE
        const topPipeY = getLocalRowY(0);
        drawSegment(
          pipeStartX,
          topPipeY - rulerHeight / 2,
          pipeWidth,
          rulerHeight,
          false,
        );

        const startPx = offsetX + lvl.start * CFG.unitW;
        drawSegment(
          startPx - CFG.pipeRadius,
          topPipeY,
          CFG.pipeRadius * 2,
          localStepH / 2,
          true,
        );
        ctx.fillStyle = "#475569";
        roundRect(
          startPx - CFG.pipeRadius - 4,
          topPipeY + localStepH / 2 - 8,
          CFG.pipeRadius * 2 + 8,
          8,
          2,
        );

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (let i = 0; i <= CFG.units; i++) {
          let px = offsetX + i * CFG.unitW;
          ctx.fillStyle = "#94a3b8";
          ctx.fillRect(px - 1, topPipeY + rulerHeight / 2 - 8, 2, 8);
          ctx.fillStyle = "white";
          ctx.font = `900 18px Nunito`;
          ctx.fillText(i, px, topPipeY - 2);
        }

        // BOTTOM RULER PIPE
        const bottomPipeY = getLocalRowY(lvl.maxRows + 1);
        drawSegment(
          pipeStartX,
          bottomPipeY - rulerHeight / 2,
          pipeWidth,
          rulerHeight,
          false,
        );

        const targetPx = offsetX + lvl.target * CFG.unitW;
        const targetTopY = bottomPipeY - localStepH / 2;
        drawSegment(
          targetPx - CFG.pipeRadius,
          targetTopY,
          CFG.pipeRadius * 2,
          localStepH / 2,
          true,
        );

        ctx.fillStyle = "#f59e0b";
        ctx.beginPath();
        ctx.roundRect(targetPx - 20, targetTopY, 40, 8, 4);
        ctx.fill();
        ctx.fillStyle = "#0f172a";
        ctx.beginPath();
        ctx.roundRect(targetPx - 14, targetTopY + 2, 28, 4, 2);
        ctx.fill();

        for (let i = 0; i <= CFG.units; i++) {
          let px = offsetX + i * CFG.unitW;
          ctx.fillStyle = "#94a3b8";
          ctx.fillRect(px - 1, bottomPipeY - rulerHeight / 2, 2, 8);
          ctx.fillStyle = i === lvl.target ? "#fcd34d" : "white";
          ctx.font = `900 18px Nunito`;
          ctx.fillText(i, px, bottomPipeY + 4);
        }

        // Watermark Help Text
        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
        ctx.font = "900 56px Nunito";
        const centerY = (CFG.topRulerY + CFG.bottomRulerY) / 2;
        ctx.fillText("ARRANGE PIPE NETWORK", LOGIC_W / 2, centerY - 30);
        ctx.fillText("TO DRAIN WATER", LOGIC_W / 2, centerY + 30);
        ctx.restore();

        // Draw Pipes
        pipesArr.forEach((p) => {
          drawSeamlessPipeStructure(
            p.col,
            p.row,
            p.val,
            p.dir,
            false,
            localStepH,
            getLocalRowY,
          );
        });

        // Draw Drag Ghost (Only if it's the active level)
        if (activeDragPipe && lvl === level) {
          drawSeamlessPipeStructure(
            snapCol,
            snapRow,
            activeDragPipe.val,
            activeDragPipe.dir,
            true,
            localStepH,
            getLocalRowY,
          );
        }

        // Draw Water
        if (fDist > 0) {
          ctx.beginPath();
          pSegments.forEach((seg) => {
            if (seg.type === "start") ctx.moveTo(seg.x, seg.y);
            else if (seg.type === "line") ctx.lineTo(seg.x, seg.y);
            else if (seg.type === "arcTo")
              ctx.arcTo(seg.x1, seg.y1, seg.x2, seg.y2, seg.radius);
          });

          ctx.setLineDash([fDist, 999999]);
          ctx.lineDashOffset = 0;

          ctx.lineWidth = CFG.pipeRadius * 1.2;
          ctx.strokeStyle = "#0ea5e9";
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.stroke();

          ctx.lineWidth = CFG.pipeRadius * 0.6;
          ctx.strokeStyle = "#7dd3fc";
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // Draw Particles
        parts.forEach((p) => {
          ctx.fillStyle = `rgba(14, 165, 233, ${p.life})`;
          ctx.beginPath();
          ctx.arc(
            p.x,
            p.y,
            Math.max(2, CFG.unitW * 0.1) + Math.random() * 2,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        });

        // Valve Wheel
        const wheelSize = 22;
        ctx.save();
        ctx.translate(startPx, topPipeY);
        ctx.rotate(vRot);
        ctx.fillStyle = "#ef4444";
        ctx.beginPath();
        ctx.arc(0, 0, wheelSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#0f172a";
        ctx.beginPath();
        ctx.arc(0, 0, wheelSize * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#ef4444";
        ctx.lineWidth = wheelSize * 0.2;
        ctx.beginPath();
        ctx.moveTo(-wheelSize, 0);
        ctx.lineTo(wheelSize, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, -wheelSize);
        ctx.lineTo(0, wheelSize);
        ctx.stroke();
        ctx.fillStyle = "#7f1d1d";
        ctx.beginPath();
        ctx.arc(0, 0, wheelSize * 0.25, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // --- Main Loop ---
      let lastTime = performance.now();

      function updatePhysics(dt) {
        currentValveRotation +=
          (targetValveRotation - currentValveRotation) * 8 * dt;

        // Transition Animation Logic
        if (isTransitioning) {
          cameraY -= 1200 * dt; // Scroll speed
          if (cameraY <= -LOGIC_H) {
            cameraY = 0;
            isTransitioning = false;
            currentLvl = (currentLvl + 1) % LEVELS.length;
            initLevel();
          }
          return; // Pause fluid physics while scrolling
        }

        if (gameState === "flow") {
          flowDist += CFG.waterSpeed * dt;
          if (flowDist >= maxFlowDist) {
            flowDist = maxFlowDist;
            const layout = buildFlowGraph();
            if (layout.reachedTarget) {
              gameState = "win";
              document.getElementById("overlay-win").classList.add("active");
            } else {
              gameState = "spill";
            }
          }
        } else if (gameState === "spill") {
          const layout = buildFlowGraph();
          for (let i = 0; i < 4; i++) {
            particles.push({
              x: layout.finalX + (Math.random() * 10 - 5),
              y: layout.finalY,
              vx: Math.random() * 80 - 40,
              vy: Math.random() * 100 - 50,
              life: 1.0,
            });
          }
          if (particles.length > 150)
            document.getElementById("overlay-lose").classList.add("active");
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i];
          p.vy += 600 * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= dt * 0.5;
          if (p.life <= 0 || p.y > LOGIC_H) particles.splice(i, 1);
        }
      }

      function render() {
        ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);

        ctx.save();
        ctx.translate(0, cameraY);

        // Render Current Level
        drawLevelContent(
          level,
          placedPipes,
          flowDist,
          pathSegments,
          particles,
          currentValveRotation,
        );

        // Render Next Level (spawning in from below during transition scroll)
        if (isTransitioning) {
          ctx.translate(0, LOGIC_H);
          let nextLvl = LEVELS[(currentLvl + 1) % LEVELS.length];
          // Next level has no water, particles, or placed pipes yet
          drawLevelContent(nextLvl, [], 0, [], [], 0);
        }

        ctx.restore();
      }

      function gameLoop(currentTime) {
        const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
        lastTime = currentTime;
        updatePhysics(dt);
        render();
        requestAnimationFrame(gameLoop);
      }

      initLevel();
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
